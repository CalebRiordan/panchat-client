<div class="message-box" [class]="{
        'local-message': message.deviceId == deviceId,
        'foreign-message': message.deviceId != deviceId,
        'same-device': sameDeviceAsPrevious
    }" [class.has-attachments]="imageUIs().length > 0 || docUIs().length > 0">

    <!-- Attachments -->
    <div class="attachments-container">
        <!-- Images -->
        @for (imgUI of imageUIs().slice(0, 3); track imgUI.attachment.url; let i = $index){
        <app-attachment 
            [attachmentUI]="imgUI"
            [index]="i"
            [totalCount]="imageUIs().length"
            [isDocumentType]="false"
            [copyingUrl]="copyingUrl()"
            [copySuccessUrl]="copySuccessUrl()"
            [copyErrorUrl]="copyErrorUrl()"
            (attachmentClick)="onAttachmentClick(i, $event)"
            (copyClick)="copyAttachment(imgUI.attachment, $event)"
            (downloadClick)="onDownloadAttachment(imgUI.attachment, $event)"
            (imageLoad)="onImageLoad($event)">
        </app-attachment>
        }

        <!-- Documents -->
        @for (docUI of docUIs().slice(0, 4); track docUI.attachment.url; let i = $index){
        <app-attachment 
            [attachmentUI]="docUI"
            [index]="i"
            [totalCount]="docUIs().length"
            [isDocumentType]="true"
            [copyingUrl]="copyingUrl()"
            [copySuccessUrl]="copySuccessUrl()"
            [copyErrorUrl]="copyErrorUrl()"
            (attachmentClick)="onAttachmentClick(imageUIs().length + i, $event)"
            (copyClick)="copyAttachment(docUI.attachment, $event)"
            (downloadClick)="onDownloadAttachment(docUI.attachment, $event)"
            (imageLoad)="onImageLoad($event)">
        </app-attachment>
        }
    </div>

    <!-- Text content -->
    @if (message.text){
    <div class="text">
        {{message.text }}
    </div>
    }
</div>
