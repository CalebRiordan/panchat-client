<div>
    <div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <input type="text" formControlName="username">
            <div class="form-error" [hidden]="getErrorMessage('username')">
                {{getErrorMessage('username')}}
            </div>

            <input type="text" formControlName="password">
            <div class="form-error" [hidden]="getErrorMessage('password')">
                {{getErrorMessage('password')}}
            </div>

            <button class="button" [disabled]="loginForm.invalid">
                Submit
            </button>
        </form>
    </div>
</div>
